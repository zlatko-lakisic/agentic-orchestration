# Public npm MCP server: https://www.npmjs.com/package/healthcare-mcp
# Aggregates tools backed by FDA OpenFDA, PubMed E-utilities, ClinicalTrials.gov, ICD-10 clinical tables, etc.
# Opt-in so the planner only surfaces it when you intend to run Node `npx` from the same environment as `main.py`.
# If Node exits with ERR_MODULE_NOT_FOUND for `dicom-parser`, the published package is missing that dependency in
# some releases—clone the repo, `npm install` there, and point stdio.command to `node` with args to `server/index.js`,
# or disable this MCP until upstream fixes npm metadata.
id: hc_healthcare_mcp
description: >-
  Healthcare-focused MCP exposing literature search (PubMed / medRxiv), FDA drug label and adverse events lookups,
  clinical trial discovery, ICD-10 code search, health topics, NCBI Bookshelf search, simple medical calculators,
  and optional DICOM metadata extraction. Suitable for evidence gathering and market/clinical research—not bedside care.
capabilities: >-
  Structured calls into public biomedical APIs with caching; best for grounded research steps alongside general LLM reasoning.
good_for: >-
  drug/device safety questions against public FDA data, literature scans, trial landscape snapshots, terminology lookup,
  and building citation-oriented research memos when combined with a writer agent.
planner_hint: >-
  Attach when the user needs PubMed/FDA/trials/ICD-10 grounded facts. Requires Node on PATH and
  AGENTIC_MCP_HEALTHCARE_TOOLS_ENABLED=1. Run command: npx -y healthcare-mcp
user_goal_keywords:
  - healthcare
  - medtech
  - pubmed
  - fda
  - clinical trial
  - icd-10
  - medrxiv
  - adverse event
  - drug label
  - dicom
  - health topic

required_env:
  - AGENTIC_MCP_HEALTHCARE_TOOLS_ENABLED

stdio:
  command: npx
  args: ["-y", "healthcare-mcp"]
