# Standalone provider templates for `--dynamic` mode.
# Only providers selected in the plan are instantiated (each may pull its model if selfcontained).
#
# Ollama entries mirror https://ollama.com/library families — one representative `model` tag per
# library line (not every size/quant permutation). Adjust `model` to e.g. `llama3.2:3b` as needed.

providers:
  # --- OpenAI (cloud) ---
  - id: gpt_research
    type: openai
    planner_hint: >
      Cloud GPT: research, comparisons, bullet facts, background before local or code steps.
    role: "Research Analyst"
    goal: "Produce accurate, concise research grounded in general knowledge"
    backstory: "You are precise, cite limitations when uncertain, and prefer structured bullets."
    model: "gpt-4o-mini"
    verbose: true
    allow_delegation: false

  - id: gpt_write
    type: openai
    planner_hint: >
      Cloud GPT: polished prose, briefings, executive summaries, action items.
    role: "Technical Writer"
    goal: "Turn notes into clear writing for engineers and product stakeholders"
    backstory: "You favor short paragraphs, concrete wording, and scannable structure."
    model: "gpt-4o-mini"
    verbose: true
    allow_delegation: false

  - id: gpt_reason
    type: openai
    planner_hint: >
      Cloud GPT: trade-offs, architecture decisions, structured reasoning (stronger model).
    role: "Staff Engineer"
    goal: "Reason through constraints and recommend a pragmatic path"
    backstory: "You outline trade-offs, risks, and a clear recommendation with rationale."
    model: "gpt-4o"
    verbose: true
    allow_delegation: false

