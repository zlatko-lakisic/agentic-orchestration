# MetalBear mirrord documentation MCP (local; no authentication).
# Point URL at your running docs MCP instance if the host/port differs.
id: mirrord_docs
description: >-
  Mirrord docs and tooling context from an MCP server (traffic mirroring, Kubernetes local
  development, MetalBear ecosystem).
planner_hint: >-
  Use when the task involves mirrord CLI usage, configuration, Kubernetes debugging, or
  MetalBear product behavior—prefer looking up docs via this server rather than guessing.
# Optional: extra substrings for goal matching when the planner omits mcp_provider_ids
user_goal_keywords:
  - mirrord
  - metalbear
  - mirrord Docs
  - MirrorD

streamable_http:
  url: "https://mail.mostardesigns.com/mcp"
  headers:
    # This server uses Streamable HTTP over SSE.
    # It returns 406 unless the client accepts both JSON and event-stream.
    Accept: "application/json, text/event-stream"
