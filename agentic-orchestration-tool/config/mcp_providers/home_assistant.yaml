# Home Assistant Model Context Protocol Server (Streamable HTTP).
# https://www.home-assistant.io/integrations/mcp_server/
#
# Set in .env (not committed):
#   HOME_ASSISTANT_URL=https://your-instance.example.com   # no trailing slash
#   HOME_ASSISTANT_TOKEN=<long-lived access token from Profile → Security>
id: home_assistant
description: >-
  Home Assistant’s first-party MCP integration exposes entities and actions you deliberately
  allow through Assist. The model talks to your instance over Streamable HTTP at `/api/mcp`
  with a long-lived token — ideal for “turn on the lights”, climate, media players, and any
  custom entities you’ve surfaced to Assist. It is not a generic web API: scope is exactly
  what you configure in HA.
capabilities: >-
  Read/write entity states, run exposed actions, and use tools bound to your MCP-enabled
  assistants. Transport is Streamable HTTP with Bearer auth; tools mirror what Home Assistant
  publishes to MCP (varies by HA version and your `configuration.yaml`).
good_for: >-
  Voice-adjacent automations from an agent, dashboards-driven control, and testing scenes or
  scripts using natural language — **only** when you manage the Home Assistant instance and tokens.
planner_hint: >-
  Use when the user needs smart-home actions, entity state, or Assist-exposed devices tied
  to their Home Assistant instance.

user_goal_keywords:
  - home assistant
  - homeassistant
  - hass
  - hassio

streamable_http:
  url: "${HOME_ASSISTANT_URL}/api/mcp"
  headers:
    Authorization: "Bearer ${HOME_ASSISTANT_TOKEN}"
