# Router metadata (optional): include this block for Ollama workflow selection.
# Set meta.router_include: false to keep a workflow file out of the router.
meta:
  id: research_brief
  summary: Factual research plus a structured engineering brief
  description: >
    Two-step pipeline: research bullet points on a topic, then a concise written
    briefing with implementation-style action items for software teams.
  good_for:
    - summarizing technical topics with citations-style facts
    - producing bullet research for stakeholders
    - writing short briefs with concrete next steps

workflow:
  name: "yaml-driven-demo"
  process: "sequential"
  topic: "CrewAI orchestration from YAML configuration"

  providers:
    - id: "researcher"
      type: "crewai"
      role: "Research Analyst"
      goal: "Find concise and practical facts about the topic"
      backstory: "You are precise, factual, and focused on relevance."
      model: "gpt-4o-mini"
      verbose: true
      allow_delegation: false

    - id: "writer"
      type: "crewai"
      role: "Technical Writer"
      goal: "Convert research into an actionable summary"
      backstory: "You create clear summaries for engineering audiences."
      model: "gpt-4o-mini"
      verbose: true
      allow_delegation: false

    # Example local provider:
    # - id: "local_researcher"
    #   type: "ollama"
    #   role: "Local Research Analyst"
    #   goal: "Research the topic with local inference"
    #   backstory: "You are optimized for local model execution."
    #   model: "llama3.1"
    #   selfcontained: true
    #   ollama_host: "http://127.0.0.1:11434"

  tasks:
    - id: "research_topic"
      provider_id: "researcher"
      description: >
        Research '{topic}' and produce 5 concise bullet points with practical
        impact for software teams.
      expected_output: "Five practical bullet points."

    - id: "write_brief"
      provider_id: "writer"
      description: >
        Use research notes to write a short briefing (150-200 words) and
        include 3 implementation action items.
      expected_output: "A short briefing and 3 action items."

  task_sequence:
    - "research_topic"
    - "write_brief"
