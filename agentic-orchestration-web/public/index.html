<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orchestrator chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Orchestrator</h1>
      <p class="subtitle">
        WebSocket → Python <code>--dynamic</code> / <code>--dynamic-iterative</code> (local only)
      </p>
    </header>

    <section class="toolbar">
      <label class="field">
        <span>Mode</span>
        <select id="runMode">
          <option value="dynamic">Dynamic</option>
          <option value="dynamic-iterative" selected>Dynamic (iterative)</option>
        </select>
      </label>
      <label class="field">
        <span>Iterative rounds</span>
        <input
          type="number"
          id="iterRounds"
          min="1"
          max="32"
          step="1"
          value="4"
        />
      </label>
      <label class="field checkbox">
        <input type="checkbox" id="autoIter" checked />
        <span>Auto-adjust iterations</span>
      </label>
      <label class="field">
        <span>Max rounds (auto)</span>
        <input type="number" id="iterMaxRounds" min="1" max="32" step="1" value="8" />
      </label>
      <label class="field checkbox">
        <input type="checkbox" id="noSynthesize" />
        <span>Skip final synthesis</span>
      </label>
      <label class="field">
        <span>Session</span>
        <input
          type="text"
          id="sessionId"
          placeholder="default (optional; enables planner memory)"
          autocomplete="off"
        />
      </label>
      <label class="field checkbox">
        <input type="checkbox" id="resetSession" />
        <span>Reset session on next send</span>
      </label>
      <label class="field checkbox">
        <input type="checkbox" id="verboseCrew" />
        <span>Show crew log (verbose)</span>
      </label>
      <div class="field field-wide">
        <span>Agents (optional explicit selection)</span>
        <div class="agent-picker-row">
          <select id="agentPickerSelect"></select>
          <button type="button" id="agentPickerAddBtn" class="secondary">Add</button>
          <button type="button" id="agentPickerClearBtn" class="secondary">Clear</button>
        </div>
        <div id="agentPickerChips" class="chips" aria-live="polite"></div>
        <small class="hint">If no agents are selected, planner chooses automatically.</small>
      </div>
      <span id="connStatus" class="status disconnected">Disconnected</span>
    </section>

    <div
      id="activityBar"
      class="activity-bar"
      role="status"
      aria-live="polite"
      aria-busy="false"
      hidden
    >
      <div class="activity-bar-inner">
        <span class="activity-spinner" aria-hidden="true"></span>
        <span id="activityLabel" class="activity-label">Agents working in the background…</span>
      </div>
      <div class="activity-bar-track" aria-hidden="true">
        <div class="activity-bar-fill"></div>
      </div>
    </div>

    <main id="chat" class="chat" aria-live="polite"></main>

    <footer class="composer">
      <div class="composer-actions" style="gap: 8px; margin-bottom: 8px;">
        <button type="button" id="rateUpBtn" class="secondary" disabled>Helpful</button>
        <button type="button" id="rateDownBtn" class="secondary" disabled>Not helpful</button>
      </div>
      <textarea
        id="input"
        rows="3"
        placeholder="Describe what you want the crew to do…"
        maxlength="32000"
      ></textarea>
      <div class="composer-actions">
        <button type="button" id="sendBtn" disabled>Send</button>
        <button type="button" id="clearBtn" class="secondary">Clear log</button>
      </div>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
